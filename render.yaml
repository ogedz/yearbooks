services:
  - type: web
    name: umic-yearbook
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: URL_PREFIX
        value: /yearbook
      - key: DATA_DIR
        value: /app/data
      - key: PYTHON_VERSION
        value: 3.11.9
    disk:
      name: umic-yearbook-data
      mountPath: /app/data
      sizeGB: 1
